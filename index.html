<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="School Portal">
  <meta name="theme-color" content="#0969da">
  <link rel="manifest" href="manifest.json">
  <title>School Portal</title>
  <style>
    body{font-family:sans-serif;background:#f6f8fa;min-height:100vh;
         display:flex;align-items:center;justify-content:center;}
    .card{background:#fff;border:1px solid #d0d7de;border-radius:12px;
          padding:32px 24px;text-align:center;max-width:320px;width:90%;}
    .icon{font-size:48px;margin-bottom:12px;}
    p{font-size:14px;color:#59636e;}
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🏫</div>
    <p id="msg">Opening portal…</p>
  </div>
  <script>
  (function() {
    var token = new URLSearchParams(location.search).get("token");
    if (!token) {
      location.replace("login.html");
      return;
    }
    fetch('https://raw.githubusercontent.com/oavjnp/school_portal/main/url.txt', {cache:'no-store'})
      .then(function(r){ return r.ok ? r.text() : Promise.reject(); })
      .then(function(url){
        url = url.trim();
        if (!url || url.charAt(0) === "#") {
          location.replace("login.html?error=Server+offline");
          return;
        }
        location.replace(url + "/teacher/auth?token=" + encodeURIComponent(token));
      })
      .catch(function(){ location.replace("login.html?error=Server+unreachable"); });
  })();
  </script>
</body>
</html>
