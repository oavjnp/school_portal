<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>School Portal</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{height:100%;overflow:hidden;background:#f6f8fa;}
    #frame{position:fixed;inset:0;width:100%;height:100%;border:none;display:none;}
    #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;
            justify-content:center;font-family:sans-serif;color:#1f2328;gap:12px;}
    #splash h2{font-size:20px;}
    #splash p{font-size:14px;color:#59636e;}
    .err{color:#cf222e !important;}
  </style>
</head>
<body>
  <div id="splash">
    <h2>🏫 School Portal</h2>
    <p id="msg">Connecting…</p>
  </div>
  <iframe id="frame" allow="camera;microphone"></iframe>
  <script>
    var token = new URLSearchParams(window.location.search).get("token");
    fetch("url.txt?t=" + Date.now())
      .then(function(r){return r.text();})
      .then(function(url){
        url = url.trim();
        if(!url || url.charAt(0)==="#"){
          document.getElementById("msg").className="err";
          document.getElementById("msg").textContent="Server is offline. Ask admin to restart.";
          return;
        }
        var dest = token
          ? url + "/teacher/auth?token=" + encodeURIComponent(token)
          : url + "/teacher";
        var f = document.getElementById("frame");
        f.src = dest;
        f.onload = function(){
          document.getElementById("splash").style.display="none";
          f.style.display="block";
        };
      })
      .catch(function(){
        document.getElementById("msg").className="err";
        document.getElementById("msg").textContent="Server offline or unreachable.";
      });
  </script>
</body>
</html>
