<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Teacher Portal — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f8fa; color: #1f2328;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    .card {
      background: #fff; border: 1px solid #d0d7de; border-radius: 10px;
      padding: 32px; width: 100%; max-width: 380px;
    }
    h1 { font-size: 1.2rem; margin-bottom: 4px; }
    .sub { color: #57606a; font-size: .88rem; margin-bottom: 24px; }
    label { display: block; font-size: .85rem; font-weight: 600; margin-bottom: 5px; }
    input[type=text], input[type=password] {
      width: 100%; padding: 9px 12px; border: 1px solid #d0d7de; border-radius: 6px;
      font-size: 1rem; background: #fff; outline: none;
    }
    input:focus { border-color: #0969da; box-shadow: 0 0 0 3px rgba(9,105,218,.15); }
    .field { margin-bottom: 16px; }
    .btn {
      width: 100%; padding: 10px; border: none; border-radius: 6px;
      background: #0969da; color: #fff; font-size: 1rem; font-weight: 600;
      cursor: pointer; margin-top: 4px; transition: background .15s;
    }
    .btn:hover:not(:disabled) { background: #0860ca; }
    .btn:disabled { background: #8ab4f8; cursor: not-allowed; }
    .error {
      margin-bottom: 16px; padding: 10px 14px; border-radius: 6px;
      background: #fff0f0; border: 1px solid #ffc7ce; color: #cf222e; font-size: .9rem;
    }
    .status {
      text-align: center; color: #57606a; font-size: .82rem; margin-top: 12px;
      min-height: 18px;
    }
    #spinner { display: none; text-align: center; padding: 24px; color: #57606a; }
    .install-bar {
      display:none; margin-bottom:16px; padding:14px;
      background:#dff7e9; border:1px solid #6ee7b7; border-radius:8px;
      font-size:.88rem; color:#166534; text-align:center;
    }
    .install-bar button {
      margin-top:8px; width:100%; padding:9px; border:none; border-radius:6px;
      font-size:.95rem; font-weight:600; cursor:pointer;
    }
    .install-bar .ib-install { background:#1a7f37; color:#fff; margin-bottom:6px; }
    .install-bar .ib-skip   { background:transparent; color:#166534; font-size:.82rem; border:1px solid #6ee7b7; }
  </style>
</head>
<body>
<div class="card">
  <h1>👨‍🏫 Teacher Portal</h1>
  <p class="sub">Odisha Adarsha Vidyalaya</p>

  <div id="installBar" class="install-bar"><strong>📲 Install as app for quick access</strong><button class="ib-install" onclick="doInstall()">Add to Home Screen</button><button class="ib-skip"  onclick="skipInstall()">Continue without installing</button></div>
  <div id="spinner">Signing you in automatically…</div>

  <div id="errorBanner" class="error" style="display:none;"></div>

  <form id="loginForm" style="display:none;" autocomplete="on">
    <div class="field">
      <label for="nameInput">Your name</label>
      <input type="text" id="nameInput" name="name" placeholder="Start typing your name…"
             list="nameList" autocomplete="name" required minlength="2">
      <datalist id="nameList"></datalist>
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Portal password" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="submitBtn" disabled>Connecting…</button>
    <p class="status" id="statusLine"></p>
  </form>
</div>

<script>
var _deferredInstall = null;
window.addEventListener('beforeinstallprompt', function(e) { e.preventDefault(); _deferredInstall = e; });

(async function () {
  const LS_TOKEN    = 'portal_token';
  const LS_DEVICE   = 'portal_device_id';
  const REPO        = 'oavjnp/school_portal';
  const GH_RAW      = `https://api.github.com/repos/${REPO}/contents/url.txt`;

  function getOrMakeDeviceId() {
    let id = localStorage.getItem(LS_DEVICE);
    if (!id) {
      id = 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
        const r = Math.random() * 16 | 0;
        return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
      });
      localStorage.setItem(LS_DEVICE, id);
    }
    return id;
  }

  async function fetchTunnelUrl() {
    const r = await fetch(GH_RAW, { cache: 'no-store' });
    const j = await r.json();
    const url = atob(j.content.replace(/\n/g, '')).trim();
    if (!url || url.startsWith('#')) throw new Error('Server offline');
    return url;
  }

  function showError(msg) {
    const b = document.getElementById('errorBanner');
    b.textContent = msg;
    b.style.display = '';
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('loginForm').style.display = '';
  }

  function setStatus(msg) {
    document.getElementById('statusLine').textContent = msg;
  }

  // Check ?error= param — means server rejected our token
  const params   = new URLSearchParams(location.search);
  const errParam = params.get('error');
  if (errParam) localStorage.removeItem(LS_TOKEN);

  // Try auto-login if we have a stored token and no error
  const storedToken = localStorage.getItem(LS_TOKEN);
  if (storedToken && !errParam) {
    document.getElementById('spinner').style.display = '';
    try {
      const tunnelUrl = await fetchTunnelUrl();
      location.replace(`${tunnelUrl}/teacher/auth?token=${storedToken}`);
      return;
    } catch (_) {
      // Server unreachable — fall through to form
      localStorage.removeItem(LS_TOKEN);
      showError('Could not reach the school server. It may be offline. Log in again when it restarts.');
    }
  }

  // Show the login form
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('loginForm').style.display = '';
  if (errParam) showError(decodeURIComponent(errParam.replace(/\+/g, ' ')));

  const deviceId = getOrMakeDeviceId();
  let tunnelUrl  = null;

  // Fetch tunnel URL in background while teacher fills the form
  setStatus('Connecting to school server…');
  fetchTunnelUrl().then(url => {
    tunnelUrl = url;
    setStatus('');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Open Portal →';
    // Populate name suggestions (best-effort)
    fetch(`${tunnelUrl}/api/admin/teachers`, { credentials: 'include' })
      .then(r => r.ok ? r.json() : [])
      .then(teachers => {
        const dl = document.getElementById('nameList');
        dl.innerHTML = teachers
          .filter(t => t.status !== 'inactive')
          .sort((a, b) => a.name.localeCompare(b.name))
          .map(t => `<option value="${t.name.replace(/"/g, '&quot;')}">`)
          .join('');
      }).catch(() => {});
  }).catch(() => {
    setStatus('⚠ Server offline — try again later');
    document.getElementById('submitBtn').disabled = false;
    document.getElementById('submitBtn').textContent = 'Try anyway →';
  });

  document.getElementById('loginForm').addEventListener('submit', async function (e) {
    e.preventDefault();
    const name = document.getElementById('nameInput').value.trim();
    const pwd  = document.getElementById('password').value.trim();
    if (!name || !pwd) return;

    if (!tunnelUrl) {
      setStatus('Still connecting…');
      try { tunnelUrl = await fetchTunnelUrl(); } catch (_) {
        showError('Cannot reach school server — check that the app is running.');
        return;
      }
    }

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;
    btn.textContent = 'Signing in…';
    setStatus('');
    document.getElementById('errorBanner').style.display = 'none';

    try {
      const resp = await fetch(`${tunnelUrl}/teacher/login`, {
        method:      'POST',
        credentials: 'include',
        headers:     { 'Content-Type': 'application/json' },
        body:        JSON.stringify({
          name,
          password:     pwd,
          device_id:    deviceId,
          device_label: navigator.userAgent.slice(0, 120),
        }),
      });
      const data = await resp.json();
      if (!resp.ok) {
        showError(data.error || 'Login failed');
        btn.disabled = false;
        btn.textContent = 'Open Portal →';
        return;
      }
      localStorage.setItem(LS_TOKEN, data.token);
      var _redirectUrl = `${tunnelUrl}/teacher/auth?token=${data.token}`;
      if (_deferredInstall) {
        var bar = document.getElementById('installBar');
        bar.style.display = '';
        window._pendingRedirect = _redirectUrl;
      } else {
        location.replace(_redirectUrl);
      }
    } catch (err) {
      showError('Network error — is the app running?');
      btn.disabled = false;
      btn.textContent = 'Open Portal →';
    }
  });
})();

function doInstall() {
  if (_deferredInstall) {
    _deferredInstall.prompt();
    _deferredInstall.userChoice.then(function() { location.replace(window._pendingRedirect); });
  } else { location.replace(window._pendingRedirect); }
}
function skipInstall() { location.replace(window._pendingRedirect); }
</script>
</body>
</html>
